name: Deploy AI Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy AI Server via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.AI_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy JUDAM AI Server" \
            --parameters 'commands=[
              "set -e",
              "cd ${{ secrets.AI_PROJECT_DIR }}",
              "git pull origin main",
              "REGION=\"${{ secrets.AWS_REGION }}\"",
              "PORT=$(aws ssm get-parameter --name \"/judam/ai/PORT\" --region \"$REGION\" --query \"Parameter.Value\" --output text)",
              "HOST=$(aws ssm get-parameter --name \"/judam/ai/HOST\" --region \"$REGION\" --query \"Parameter.Value\" --output text)",
              "APP_AWS_REGION=$(aws ssm get-parameter --name \"/judam/ai/AWS_REGION\" --region \"$REGION\" --query \"Parameter.Value\" --output text)",
              "SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id \"judam/ai/secrets\" --region \"$REGION\" --query \"SecretString\" --output text)",
              "export SECRET_JSON",
              "GEMINI_API_KEY=$(python3 -c \"import json, os; print(json.loads(os.environ['\''SECRET_JSON'\''])['\''GEMINI_API_KEY'\''])\")",
              "ENV_TMP=$(mktemp .env.XXXXXX)",
              "echo \"PORT=$PORT\" > \"$ENV_TMP\"",
              "echo \"HOST=$HOST\" >> \"$ENV_TMP\"",
              "echo \"AWS_REGION=$APP_AWS_REGION\" >> \"$ENV_TMP\"",
              "echo \"GEMINI_API_KEY=$GEMINI_API_KEY\" >> \"$ENV_TMP\"",
              "chmod 600 \"$ENV_TMP\"",
              "mv \"$ENV_TMP\" .env",
              "pm2 restart judam-ai-server --update-env || pm2 start \"uvicorn main:app --host 0.0.0.0 --port 8000\" --name judam-ai-server",
              "pm2 save",
              "curl http://localhost:8000/health"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.AI_INSTANCE_ID }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.AI_INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text