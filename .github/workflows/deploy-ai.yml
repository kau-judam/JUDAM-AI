name: Deploy AI Server to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy AI server via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.AI_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy JUDAM AI server" \
            --parameters 'commands=[
              "cd ${{ secrets.AI_PROJECT_DIR }}",
              "git pull origin main",
              "source venv/bin/activate && pip install -r requirements.txt",
              "pm2 restart judam-ai-server",
              "pm2 status",
              "curl -f http://localhost:8000/health"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.AI_INSTANCE_ID }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.AI_INSTANCE_ID }}"